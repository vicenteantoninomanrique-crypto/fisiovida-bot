<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: transparent; }

  #chat-bubble {
    position: fixed;
    bottom: 24px;
    left: 24px;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: #456248;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    box-shadow: 0 4px 16px rgba(69,98,72,0.35);
    z-index: 9999;
    transition: transform 0.2s;
  }
  #chat-bubble:hover { transform: scale(1.05); }
  #chat-bubble img {
    width: 26px; height: 26px;
    object-fit: contain;
    filter: brightness(0) invert(1);
  }

  #chat-window {
    position: fixed;
    bottom: 88px;
    left: 24px;
    width: 340px;
    max-height: 400px;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    background: #EDE8DF;
    display: none;
    flex-direction: column;
    overflow: hidden;
    border: 1px solid rgba(0,0,0,0.08);
    z-index: 9998;
    transition: opacity 0.2s, transform 0.2s;
  }
  #chat-window.open {
    display: flex;
  }

  .chat-header {
    background: #456248;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .chat-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: #F8F6F2;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
  }
  .chat-avatar img {
    width: 22px; height: 22px;
    object-fit: contain;
  }
  .header-text p { margin: 0; }
  .header-name { font-size: 14px; font-weight: 500; color: #fff; }
  .header-status { font-size: 11px; color: rgba(255,255,255,0.75); }
  .close-btn {
    margin-left: auto;
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(255,255,255,0.75);
    font-size: 20px;
    line-height: 1;
    padding: 0 0 0 8px;
  }
  .close-btn:hover { color: #fff; }

  #messages {
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow-y: auto;
    flex: 1;
    background: #EDE8DF;
  }
  .msg {
    max-width: 82%;
    border-radius: 12px;
    padding: 9px 13px;
    font-size: 13px;
    line-height: 1.55;
  }
  .msg-bot {
    background: #F8F6F2;
    color: #9A9A9A;
    align-self: flex-start;
    border-bottom-left-radius: 3px;
  }
  .msg-user {
    background: #456248;
    color: #fff;
    align-self: flex-end;
    border-bottom-right-radius: 3px;
  }
  .msg-typing {
    color: #9A9A9A;
    font-style: italic;
    font-size: 12px;
    align-self: flex-start;
  }

  .input-area {
    padding: 10px 12px;
    display: flex;
    gap: 8px;
    background: #F8F6F2;
    border-top: 1px solid rgba(0,0,0,0.07);
    flex-shrink: 0;
  }
  .input-area input {
    flex: 1;
    border: none;
    border-radius: 20px;
    padding: 8px 14px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    outline: none;
    background: #F8F6F2;
    color: #9A9A9A;
  }
  .input-area input::placeholder { color: #9A9A9A; }
  .send-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: #456248;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .send-btn svg { width: 15px; height: 15px; fill: #fff; }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>

<button id="chat-bubble" onclick="toggleChat()">
  <img src="logo.png" alt="FisioVida" />
</button>

<div id="chat-window">
  <div class="chat-header">
    <div class="chat-avatar">
      <img src="logo.png" alt="FisioVida" />
    </div>
    <div class="header-text">
      <p class="header-name">Asistente Virtual</p>
      <p class="header-status">● En línea</p>
    </div>
    <button class="close-btn" onclick="toggleChat()">×</button>
  </div>
  <div id="messages">
    <div class="msg msg-bot">¡Hola! Soy el asistente virtual de FisioVida. Puedo ayudarte a resolver dudas, elegir tu tipo de sesión o reservar una cita. ¿En qué te ayudo?</div>
  </div>
  <div class="input-area">
    <input id="user-input" type="text" placeholder="Escribe tu pregunta..." onkeydown="if(event.key==='Enter') sendMessage()" />
    <button class="send-btn" id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>

<script>
  const WEBHOOK_URL = 'https://sphere-grudge-front.ngrok-free.dev/webhook/bot-fisiovida';

  function toggleChat() {
    document.getElementById('chat-window').classList.toggle('open');
  }

  function addMessage(text, type) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg ' + (type === 'typing' ? 'msg-typing' : 'msg-' + type);
    div.textContent = type === 'typing' ? 'Escribiendo...' : text;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const btn = document.getElementById('send-btn');
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, 'user');
    input.value = '';
    btn.disabled = true;

    const typing = addMessage('', 'typing');

    try {
      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      typing.remove();
      addMessage(data[0].reply, 'bot');
    } catch (e) {
      typing.remove();
      addMessage('Lo siento, ahora mismo no puedo responder. Llámanos para más información.', 'bot');
    }

    btn.disabled = false;
    input.focus();
  }
</script>

</body>
</html>
